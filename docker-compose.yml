# docker-compose.yml — généré depuis le registre des serveurs (cf. install.sh).
# Lance le lobby + tous les serveurs de jeu en conteneurs.
#
# Prérequis : avoir lancé ./install.sh une fois (clone les serveurs + génère les .env).
# En Docker, les serveurs se joignent par leur NOM DE SERVICE (pas localhost) :
# les URLs inter-serveurs sont donc surchargées ci-dessous.

services:

  lobby-server:
    build:
      context: ./lobby-server
      dockerfile: ../Dockerfile
    env_file: ./lobby-server/.env
    environment:
      PORT: 10000
      UNO_SERVER_URL: http://uno-server:10001
      QUIZ_SERVER_URL: http://quiz-server:10002
      TABOO_SERVER_URL: http://taboo-server:10003
      SKYJOW_SERVER_URL: http://skyjow-server:10004
      YAHTZEE_SERVER_URL: http://yahtzee-server:10005
      PUISSANCE4_SERVER_URL: http://puissance4-server:10006
      JUSTONE_SERVER_URL: http://just-one-server:10007
      BATTLESHIP_SERVER_URL: http://battleship-server:10008
      DIAMANT_SERVER_URL: http://diamant-server:10009
      IMPOSTOR_SERVER_URL: http://impostor-server:10010
      LUDO_SERVER_URL: http://ludo-server:10011
      PERUDO_SERVER_URL: http://perudo-server:10012
      CANT_STOP_SERVER_URL: http://cant-stop-server:10013
      MILLE_BORNES_SERVER_URL: http://mille-bornes-server:10014
      SPYFALL_SERVER_URL: http://spyfall-server:10015
    ports:
      - "10000:10000"
    restart: unless-stopped

  uno-server:
    build:
      context: ./uno-server
      dockerfile: ../Dockerfile
    env_file: ./uno-server/.env
    environment:
      PORT: 10001
      LOBBY_SERVER_URL: http://lobby-server:10000
    ports:
      - "10001:10001"
    restart: unless-stopped
    depends_on:
      - lobby-server

